<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成分股異動分析</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #000; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .infographic { width: 720px; background-color: #060a14; border: 2px solid #1a2c4e; border-radius: 8px; overflow: hidden; }
        .main-header { background: linear-gradient(180deg, #0f1c35 0%, #060a14 100%); text-align: center; padding: 20px; border-bottom: 2px solid #1a2c4e; }
        .main-title { color: #fff; font-size: 28px; font-weight: 900; }
        .etf-section { padding: 15px; border-bottom: 2px solid #1a2c4e; }
        .etf-title { color: #00aaff; font-size: 18px; font-weight: 900; margin-bottom: 10px; border-left: 4px solid #00aaff; padding-left: 10px; }
        .tables-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .table-box { background: #0d1424; border-radius: 6px; padding: 10px; border: 1px solid #1e2c45; }
        .box-header { font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #8898aa; }
        .item { display: flex; justify-content: space-between; font-size: 14px; padding: 5px 0; border-bottom: 1px solid #1e2c45; }
        .buy { color: #f87171; font-weight: bold; }
        .sell { color: #4ade80; font-weight: bold; }
        .tag { font-size: 9px; background: #333; padding: 1px 4px; border-radius: 3px; margin-left: 5px; }
    </style>
</head>
<body>
    <div class="infographic">
        <div class="main-header"><div class="main-title">投信成分股異動分析</div></div>
        
        <div id="content"></div>
        
    </div>
</body>
</html>
